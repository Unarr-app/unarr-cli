name: release

# Cuts a GitHub Release on every vX.Y.Z tag. This replaces the old self-hosted
# pipeline (Forgejo CI + `make ship` → Hetzner), which existed only while the
# project's GitHub account was unavailable. goreleaser cross-compiles the six
# targets, bundles ffmpeg, signs checksums.txt with the ed25519 release key, and
# uploads the archives + checksums + .sig as release assets — the self-updater
# fetches these directly from GitHub. A second job builds + pushes the multi-arch
# Docker image to Docker Hub, mirroring ship.sh's docker step.
#
# Required repo secrets:
#   RELEASE_SIGNING_KEY  ed25519 private key (base64) — signing FAILS the build if absent
#   DOCKERHUB_USERNAME / DOCKERHUB_TOKEN  Docker Hub push creds
#   SENTRY_DSN           telemetry DSN baked at build time (optional; empty = Sentry off)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)release, e.g. v1.2.2-beta"
        required: true

permissions:
  contents: write # create the GitHub Release + upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for the changelog
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Pin the Go toolchain to the exact go.mod version (same expression ship.sh
      # uses) so the GitHub build is byte-identical to the local Hetzner build —
      # reproducible releases. Single source of truth = go.mod's `go` line.
      - name: Pin Go toolchain from go.mod
        run: echo "GOTOOLCHAIN=go$(awk '/^go /{print $2; exit}' go.mod)" >> "$GITHUB_ENV"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

  docker:
    runs-on: ubuntu-latest
    needs: goreleaser # only push an image for a release that built + signed cleanly
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Compute tags
        id: meta
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${REF#v}"
          MINOR="${VERSION%.*}"
          echo "tag=$REF" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.tag }}
          tags: |
            unarr/cli:${{ steps.meta.outputs.version }}
            unarr/cli:${{ steps.meta.outputs.minor }}
            unarr/cli:latest

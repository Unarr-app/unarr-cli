version: 2

project_name: unarr

# Pre-build hook: fetch static ffmpeg + ffprobe per platform so each
# release tarball ships them adjacent to the unarr binary. ResolveFFmpeg /
# ResolveFFprobe pick them up via the "adjacent to executable" branch — no
# system install or runtime download needed.
before:
  hooks:
    - bash scripts/download-ffmpeg-static.sh

builds:
  - main: ./cmd/unarr/
    binary: unarr
    env:
      - CGO_ENABLED=0
    # Reproducible builds: -trimpath drops the absolute build path (which differs
    # between a GitHub runner /home/runner/... and a local ship /home/<user>/...),
    # and mod_timestamp pins every embedded/file mtime to the commit time. With
    # CGO disabled and the Go toolchain pinned (release.yml + ship.sh derive it
    # from go.mod), the GitHub and Hetzner builds are byte-identical — so the two
    # mirrors' checksums.txt + .sig match. (The updater also never mixes mirrors;
    # see internal/upgrade — this just makes the artifacts auditable/rebuildable.)
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Unarr-app/unarr-cli/internal/cmd.Version={{.Version}}
      - -X github.com/Unarr-app/unarr-cli/internal/sentry.dsn={{ .Env.SENTRY_DSN }}
      # The release-signing PUBLIC key is compiled in as the canonical default
      # in internal/upgrade/signature.go (it's public — committing it removes
      # the "empty env var → unsigned binary" footgun). No ldflag override:
      # every build bakes the same key and verifies checksums.txt.sig.

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README*
      # Bundle the matching ffmpeg + ffprobe (filename includes .exe on Windows
      # because download-ffmpeg-static.sh writes ffmpeg.exe / ffprobe.exe there).
      - src: "dist-ffbinaries/{{ .Os }}-{{ .Arch }}/*"
        dst: .
        strip_parent: true
        info:
          mode: 0o755

checksum:
  name_template: "checksums.txt"

# Sign checksums.txt with the release ed25519 private key → checksums.txt.sig,
# verified by the self-updater against the compiled-in public key. Releases are
# signed UNCONDITIONALLY: sign-checksums requires -key, so an unset/empty
# RELEASE_SIGNING_KEY makes this step (and the whole `goreleaser release`) fail
# rather than silently shipping an unsigned release. ship.sh sources the key
# from ~/.config/unarr-release/signing.key (or the RELEASE_SIGNING_KEY env).
signs:
  - id: checksums
    cmd: go
    args:
      - run
      - ./scripts/sign-checksums
      - -key
      - "{{ .Env.RELEASE_SIGNING_KEY }}"
      - -in
      - "${artifact}"
      - -out
      - "${signature}"
    signature: "${artifact}.sig"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Publishes to GitHub Releases — goreleaser auto-detects the GitHub provider
# from GITHUB_TOKEN (set by .github/workflows/release.yml). ship.sh runs with
# `--skip=publish`, so the standalone path never needs a provider here.
release:
  draft: false
  prerelease: auto

# Homebrew cask — auto-updates Unarr-app/homebrew-tap (Casks/unarr.rb) on every
# release. `homebrew_casks` is goreleaser's current mechanism (the old `brews`
# formula generator is deprecated). Casks are macOS-only; Linux users install via
# https://unarr.app/install.sh or Docker.
#
# `skip_upload` is gated on HOMEBREW_TAP_TOKEN: until that secret exists the cask is
# generated but NOT pushed (no-op, never fails a release); once set it's committed
# automatically. To activate, create a PAT with `repo` scope (or fine-grained
# Contents:rw) on Unarr-app/homebrew-tap and add it as the `HOMEBREW_TAP_TOKEN`
# secret here (GITHUB_TOKEN can't push to another repo). release.yml passes the
# secret as env, so .Env.HOMEBREW_TAP_TOKEN is always defined (empty when unset).
# ship.sh runs `--skip=publish`, so this never runs locally.
homebrew_casks:
  - repository:
      owner: Unarr-app
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    skip_upload: '{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}'
    commit_author:
      name: unarr-release-bot
      email: ops@unarr.app
    name: unarr
    binaries:
      - unarr
    homepage: https://unarr.app
    description: "Self-hosted media manager, player and debrid agent CLI"
    # The CLI binary isn't notarized, so strip the quarantine xattr after staging
    # (covers the bundled ffmpeg/ffprobe that sit alongside unarr in the archive,
    # which it resolves as siblings of its own executable path).
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}"]
          end
